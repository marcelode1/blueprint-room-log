
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🔔 Access Notifications</h2>
    <form method="post"><button type="submit">Mark All as Read</button></form>
</div>
<div class="card">
    {% for e in events %}
        <div class="card" style="border-left:6px solid {% if e.is_read %}#64748b{% else %}#dc2626{% endif %};">
            <strong>{{ e.user_name or 'Unknown user' }}</strong> logged in<br>
            <span class="muted">{{ e.user_email }} — {{ e.role }} — {{ e.created_at }}</span>
        </div>
    {% else %}
        <p>No login events yet.</p>
    {% endfor %}
</div>
{% endblock %}
