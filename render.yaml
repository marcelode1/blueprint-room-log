services:
  - type: web
    name: blueprint-room-log-v2
    runtime: python
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --prefer-binary -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: blueprint-files
