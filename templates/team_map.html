{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Where Is My Team</h2>
    <p class="muted" id="teamStatus">Loading team locations...</p>
</div>

<div class="card">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        #teamMap{width:100%;height:620px;border:1px solid var(--border);border-radius:12px;background:white}
        .teamList{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:14px}
        .teamPerson{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--card)}
        @media(max-width:760px){#teamMap{height:520px}}
    </style>
    <div id="teamMap"></div>
    <div class="teamList" id="teamList"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    const teamMap=L.map("teamMap").setView([39.5,-98.35],4);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(teamMap);
    const markers=new Map();
    const teamStatus=document.getElementById("teamStatus");
    const teamList=document.getElementById("teamList");

    function markerHtml(worker){
        const accuracy=worker.accuracy?`<br>Accuracy: ${Math.round(worker.accuracy)} m`:"";
        return `<strong>${worker.name}</strong><br>${worker.project_name}<br>${worker.source}<br>Clock in: ${worker.clock_in_time}<br>Last seen: ${worker.last_seen}${accuracy}<br>${worker.address||""}`;
    }

    function listHtml(worker){
        return `<div class="teamPerson"><strong>${worker.name}</strong><br><span class="muted">${worker.email||""}</span><p>${worker.project_name}</p><p>${worker.source}: ${worker.last_seen}</p>${worker.address?`<p>${worker.address}</p>`:""}</div>`;
    }

    async function loadTeam(){
        try{
            const res=await fetch("{{ url_for('team_map_data') }}",{cache:"no-store"});
            const data=await res.json();
            const workers=data.workers||[];
            const seen=new Set();
            teamStatus.textContent=workers.length?`${workers.length} active worker(s). Last refresh ${data.updated_at}.`:"No active clocked-in workers.";
            teamList.innerHTML=workers.map(listHtml).join("");
            const bounds=[];
            workers.forEach(worker=>{
                seen.add(String(worker.user_id));
                const pos=[worker.latitude,worker.longitude];
                bounds.push(pos);
                if(!markers.has(String(worker.user_id))){
                    markers.set(String(worker.user_id),L.marker(pos).addTo(teamMap));
                }else{
                    markers.get(String(worker.user_id)).setLatLng(pos);
                }
                markers.get(String(worker.user_id)).bindPopup(markerHtml(worker));
            });
            for(const [id,marker] of markers.entries()){
                if(!seen.has(id)){
                    teamMap.removeLayer(marker);
                    markers.delete(id);
                }
            }
            if(bounds.length){
                teamMap.fitBounds(bounds,{padding:[40,40],maxZoom:16});
            }
        }catch(e){
            teamStatus.textContent="Could not load team locations.";
        }
    }
    loadTeam();
    setInterval(loadTeam,30000);
    </script>
</div>
{% endblock %}
